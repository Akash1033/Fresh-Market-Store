<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Fresh Market — your one-stop grocery store for fresh fruits, vegetables, dairy and more." />
  <title>Fresh Market — Home</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>Fresh Market</h1>
    <p>Shop smart, live fresh</p>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="web.html" class="active">Home</a>
    <a href="products.html">Shop / Products</a>
    <a href="about.html">About Us</a>
  </nav>

  <!-- Banner -->
  <div class="banner">
    <img src="img/banner.jpg" alt="Fresh groceries banner" />
  </div>

  <!-- Categories -->
  <p class="section-heading">Shop by Category</p>

  <div class="category-grid">

    <a href="products.html" class="cat-card">
      <img src="img/pexels-olia-danilevich-5418665.jpg" alt="Fruits" />
      <h3>Fruits</h3>
    </a>

    <a href="products.html" class="cat-card">
      <img src="img/vegitables.jpg" alt="Vegetables" />
      <h3>Vegetables</h3>
    </a>

    <a href="products.html" class="cat-card">
      <img src="img/dheiueuwhiuewgewu.jpg" alt="Dairy" />
      <h3>Dairy</h3>
    </a>

    <a href="products.html" class="cat-card">
      <img src="img/daily snacks.jpg" alt="Snacks" />
      <h3>Snacks</h3>
    </a>

    <a href="products.html" class="cat-card">
      <img src="img/liqure.jpg" alt="Soft Alcohol" />
      <h3>Soft Alcohol</h3>
    </a>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2026 Fresh Market | All Rights Reserved</p>
  </div>

  <script src="script.js"></script>
</body>

</html>
